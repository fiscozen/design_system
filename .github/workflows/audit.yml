name: Dependency Audit

# Production dependency audit gate (LIB-2651). Mirrors the husky pre-push hook
# but, unlike the local hook (which is skippable), this is an enforceable
# required status check. It blocks ONLY on high/critical vulnerabilities in the
# PUBLISHED (production) dependency surface — dev/build-tool advisories do not
# propagate to consumers and are tracked via Renovate / dependency-triage.

on:
  pull_request:
  push:
    branches: [main]

jobs:
  prod-audit:
    name: Production dependency audit (high+critical)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Audit production dependencies
        run: pnpm audit --prod --audit-level high
